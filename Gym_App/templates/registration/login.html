{% extends 'base.html' %}
{% load static %}

{% block title %}<title>Login - Gym App</title>{% endblock %}

{% block extra_head %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<section>
    <h2>Acceso al Sistema</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Iniciar Sesión</button>
    </form>
</section>
{% endblock %}
